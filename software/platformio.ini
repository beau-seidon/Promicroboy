; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[platformio]
; src_dir = Arduinoboy

[env]
lib_deps =
    https://github.com/FortySevenEffects/arduino_midi_library.git
    https://github.com/lathoub/Arduino-USBMIDI.git
    https://github.com/arduino-libraries/MIDIUSB.git

[env:uno]
platform = atmelavr
framework = arduino
board = uno

[env:promicro]
platform = atmelavr
board = sparkfun_promicro16
framework = arduino
build_flags = -DPRO_MICRO

; [env:teensy31]
; platform = teensy
; framework = arduino
; board = teensy31
; targets = upload
; build_flags = -UUSB_SERIAL -DUSB_MIDI
; board_build.f_cpu = 24000000L